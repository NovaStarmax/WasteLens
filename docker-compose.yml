services:
  wastelens-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    environment:
      - MODEL_PATH=/app/checkpoints/best_model.pt
    volumes:
      - ./model/checkpoints:/app/checkpoints:ro
    expose:
      - "8000"
    restart: unless-stopped

  wastelens-app:
    build:
      context: ./app
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - wastelens-api
    restart: unless-stopped
