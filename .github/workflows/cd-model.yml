name: CD Model

on:
  workflow_run:
    workflows: ["Model Training"]
    types: [completed]
    branches: [develop]

jobs:
  deploy-model:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: best-model-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifacts/

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Copy model to VPS
        run: |
          scp ./artifacts/best_model.pt ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/best_model.pt

      - name: Download evaluation reports artifact
        uses: actions/download-artifact@v4
        with:
          name: training-reports-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ./artifacts/

      - name: Verify model integrity
        run: |
          cd ./artifacts
          sha256sum -c best_model.sha256
          echo "✅ Model integrity verified"

      - name: Copy reports to VPS
        run: |
          scp ./artifacts/evaluation_report.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/evaluation_report.json
          scp ./artifacts/confusion_matrix.png ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/confusion_matrix.png

      - name: Deploy model on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo /usr/local/bin/deploy-wastelens-model"

      - name: Deployment summary
        run: |
          echo "## ✅ Model Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.event.workflow_run.head_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Model:** best_model.pt" >> $GITHUB_STEP_SUMMARY
          echo "- **Reports:** evaluation_report.json + confusion_matrix.png" >> $GITHUB_STEP_SUMMARY
